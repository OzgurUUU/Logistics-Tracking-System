<div class="flex h-screen bg-gray-100 font-sans">
  
  <aside class="w-80 bg-white shadow-xl flex flex-col z-10">
    <div class="p-6 bg-blue-600 text-white">
      <h1 class="text-2xl font-bold tracking-wider">📦 Lojistik Takip</h1>
      <p class="text-blue-200 text-sm mt-1">Canlı Saha Operasyonu</p>
    </div>

    <div class="p-6 flex-grow">
      <div class="bg-gray-50 rounded-xl p-4 border border-gray-100 shadow-sm mb-6">
        <h3 class="text-gray-500 text-sm font-semibold mb-1">Aktif Kurye Sayısı</h3>
        <p class="text-4xl font-black text-blue-600">{{ activeCouriersCount }}</p>
      </div>

      <h3 class="text-gray-800 font-semibold mb-3 border-b pb-2">Son Hareketler</h3>
      <ul class="space-y-3">
        <li *ngFor="let log of recentLogs" class="text-sm bg-blue-50 text-blue-800 p-3 rounded-lg border-l-4 border-blue-500 animate-fade-in">
          {{ log }}
        </li>
      </ul>
    </div>
  </aside>

  <main class="flex-grow relative">
    <div id="map" class="w-full h-full z-0"></div>
    
    <div class="absolute top-4 right-4 bg-white px-4 py-2 rounded-full shadow-lg flex items-center gap-2 z-[1000]">
      <span class="relative flex h-3 w-3">
        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
        <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
      </span>
      <span class="text-sm font-medium text-gray-700">Sistem Canlı</span>
    </div>
  </main>
</div>

<div class="flex h-screen bg-gray-900 text-gray-100 font-sans">

  <app-sidebar
    [activeCouriersCount]="activeCouriersCount"
    [couriersList]="couriersList"
    [recentLogs]="recentLogs"
    (courierFocused)="focusOnCourier($event)">
  </app-sidebar>

  <main class="flex-grow relative bg-gray-900">
    <app-map (locationDropped)="onLocationDropped($event)"></app-map>
    
    <div class="absolute top-4 right-4 bg-gray-800 border border-gray-700 px-4 py-2 rounded-full shadow-lg flex items-center gap-2 z-[1000]">
      <span class="relative flex h-3 w-3">
        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
        <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
      </span>
      <span class="text-sm font-medium text-gray-200">Sistem Canlı</span>
    </div>
  </main>

  <div *ngIf="isModalOpen" class="fixed inset-0 z-[9999] flex items-center justify-center bg-black/70 backdrop-blur-sm">
    <div class="bg-gray-800 border border-gray-700 p-8 rounded-2xl shadow-2xl w-96 animate-zoom-in">
      <h2 class="text-xl font-bold text-blue-400 mb-6 flex items-center gap-2">
        <span>🆕</span> Yeni Kurye Kaydı
      </h2>

      <div class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">Kurye Adı</label>
          <input [(ngModel)]="newCourierData.name" type="text" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 text-white focus:border-blue-500 outline-none transition-all" placeholder="Örn: Ahmet Yılmaz">
        </div>

        <div>
          <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">Araç Tipi</label>
          <select [(ngModel)]="newCourierData.vehicleType" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 text-white focus:border-blue-500 outline-none">
            <option value="Motorcycle">Motosiklet 🏍️</option>
            <option value="Bicycle">Bisiklet 🚲</option>
            <option value="Car">Araba 🚗</option>
            <option value="Scooter">Scooter 🛴</option>
          </select>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">Enlem</label>
            <input [value]="newCourierData.lastLatitude.toFixed(4)" disabled class="w-full bg-gray-800 border border-gray-700 rounded-lg p-2 text-gray-500 text-sm italic">
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">Boylam</label>
            <input [value]="newCourierData.lastLongitude.toFixed(4)" disabled class="w-full bg-gray-800 border border-gray-700 rounded-lg p-2 text-gray-500 text-sm italic">
          </div>
        </div>
      </div>

      <div class="flex gap-3 mt-8">
        <button (click)="isModalOpen = false" class="flex-1 px-4 py-3 bg-gray-700 hover:bg-gray-600 text-gray-200 rounded-xl transition-colors font-medium">İptal</button>
        <button (click)="saveCourier()" class="flex-1 px-4 py-3 bg-blue-600 hover:bg-blue-500 text-white rounded-xl transition-all shadow-lg shadow-blue-900/20 font-bold">Kaydet</button>
      </div>
    </div>
  </div>

  <div *ngIf="isOrderModalOpen" class="fixed inset-0 z-[9999] flex items-center justify-center bg-black/70 backdrop-blur-sm">
    <div class="bg-gray-800 border border-orange-500/50 p-8 rounded-2xl shadow-2xl w-96 animate-zoom-in">
      <h2 class="text-xl font-bold text-orange-400 mb-6 flex items-center gap-2">
        <span>📦</span> Yeni Sipariş Gönder
      </h2>
  
      <div class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">Müşteri Adı / Notu</label>
          <input [(ngModel)]="newOrderData.customerName" type="text" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 text-white focus:border-orange-500 outline-none transition-all" placeholder="Örn: Ayşe Hanım - Zile basmayın">
        </div>
  
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">Hedef Enlem</label>
            <input [value]="newOrderData.latitude.toFixed(4)" disabled class="w-full bg-gray-800 border border-gray-700 rounded-lg p-2 text-gray-500 text-sm italic">
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">Hedef Boylam</label>
            <input [value]="newOrderData.longitude.toFixed(4)" disabled class="w-full bg-gray-800 border border-gray-700 rounded-lg p-2 text-gray-500 text-sm italic">
          </div>
        </div>
      </div>
  
      <div class="flex gap-3 mt-8">
        <button (click)="isOrderModalOpen = false" class="flex-1 px-4 py-3 bg-gray-700 hover:bg-gray-600 text-gray-200 rounded-xl transition-colors font-medium">İptal</button>
        <button (click)="saveOrder()" class="flex-1 px-4 py-3 bg-orange-600 hover:bg-orange-500 text-white rounded-xl transition-all shadow-lg shadow-orange-900/20 font-bold">Siparişi Ata</button>
      </div>
    </div>
  </div>

</div>

services:
  db:
    image: postgres:latest
    container_name: backend_db
    environment:
      POSTGRES_USER: ozgur
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: courier_db
    ports:
      - "5432:5432"

  cache:
    image: redis:latest
    container_name: backend_redis
    ports:
      - "6379:6379"

  redis-insight: 
    image: redis/redisinsight:latest
    container_name: redis_insight
    ports:
      - "5540:5540"